name: Generate ARM Templates

on:
  push:
    branches: [main]
    paths:
      - "bicep/**/*.bicep"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Compile Bicep → ARM JSON
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ARM templates
        run: |
          az bicep build --file bicep/windows/main.bicep --outfile bicep/windows/azuredeploy.json
          az bicep build --file bicep/linux/main.bicep --outfile bicep/linux/azuredeploy.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet bicep/*/azuredeploy.json && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regenerate azuredeploy.json from Bicep templates"
          branch: auto/update-arm-templates
          title: "chore: regenerate ARM templates from Bicep"
          body: |
            Auto-generated PR to update ARM templates after Bicep source changes.

            This PR was created automatically by the `generate-arm-templates` workflow.
            Please review the generated JSON before merging.
          labels: automated
