name: Deploy Bicep – Linux VM with ADE

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: "Target resource group (must already exist)"
        required: true
        type: string
      location:
        description: "Azure region for all resources"
        required: false
        type: string
        default: "eastus"
      prefix:
        description: "Prefix applied to every resource name (2-10 chars)"
        required: false
        type: string
        default: "adelab"
      admin_username:
        description: "Admin username for the Linux VM"
        required: true
        type: string
      vm_size:
        description: "VM SKU size"
        required: false
        type: string
        default: "Standard_D2s_v5"
      allowed_ssh_source_address:
        description: "Source IP/CIDR for SSH access (use 'Deny' to block)"
        required: false
        type: string
        default: "Deny"

permissions:
  id-token: write
  contents: read

env:
  TEMPLATE_FILE: bicep/linux/main.bicep

jobs:
  deploy:
    name: Deploy Linux VM with ADE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get deployer Object ID
        id: oid
        run: |
          OID=$(az ad signed-in-user show --query id -o tsv 2>/dev/null \
                || az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv)
          echo "object_id=$OID" >> "$GITHUB_OUTPUT"

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        id: deploy
        with:
          resourceGroupName: ${{ inputs.resource_group }}
          template: ${{ env.TEMPLATE_FILE }}
          parameters: >-
            location=${{ inputs.location }}
            prefix=${{ inputs.prefix }}
            adminUsername=${{ inputs.admin_username }}
            adminSshPublicKey=${{ secrets.VM_SSH_PUBLIC_KEY }}
            vmSize=${{ inputs.vm_size }}
            keyVaultAdminObjectId=${{ steps.oid.outputs.object_id }}
            allowedSshSourceAddress=${{ inputs.allowed_ssh_source_address }}
          failOnStdErr: false

      - name: Show deployment outputs
        run: |
          echo "### Deployment Outputs" >> "$GITHUB_STEP_SUMMARY"
          echo "| Output | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| VM Name | ${{ steps.deploy.outputs.vmName }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Public IP | ${{ steps.deploy.outputs.publicIpAddress }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key Vault | ${{ steps.deploy.outputs.keyVaultName }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | ${{ steps.deploy.outputs.resourceGroupName }} |" >> "$GITHUB_STEP_SUMMARY"
