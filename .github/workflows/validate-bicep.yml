name: Validate Bicep Templates

on:
  push:
    branches: [main]
    paths:
      - "bicep/**/*.bicep"
  pull_request:
    branches: [main]
    paths:
      - "bicep/**/*.bicep"

permissions:
  contents: read

jobs:
  validate:
    name: Lint & Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template:
          - bicep/windows/main.bicep
          - bicep/linux/main.bicep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bicep Lint
        run: az bicep lint --file ${{ matrix.template }}

      - name: Bicep Build
        run: az bicep build --file ${{ matrix.template }} --stdout > /dev/null
